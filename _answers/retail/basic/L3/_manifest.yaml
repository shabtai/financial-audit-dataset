vertical: retail
size: basic
level: L3
period_start: '2025-01-01'
period_end: '2025-12-31'
seed: 20260513
n_tables: 13
tables:
  chart_of_accounts:
    rows: 30
    columns:
    - account_id
    - account_name
    - account_type
    - parent_account_id
    - is_active
  journal_entries:
    rows: 2408
    columns:
    - entry_id
    - entry_date
    - account_id
    - debit
    - credit
    - memo
    - posted_by
    - posted_at
  trial_balance:
    rows: 30
    columns:
    - account_id
    - account_name
    - account_type
    - period_end
    - debit_balance
    - credit_balance
  customers:
    rows: 80
    columns:
    - customer_id
    - customer_name
    - customer_type
    - tax_id
    - email
    - phone
    - billing_country
    - credit_limit
    - created_at
    - is_active
  vendors:
    rows: 41
    columns:
    - vendor_id
    - vendor_name
    - tax_id
    - payment_terms
    - bank_account_last4
    - contact_email
    - country
    - is_1099
    - created_at
    - is_active
  ar_invoices:
    rows: 400
    columns:
    - invoice_id
    - customer_id
    - invoice_date
    - due_date
    - amount
    - paid_amount
    - balance
    - status
    - currency
  ap_invoices:
    rows: 240
    columns:
    - bill_id
    - vendor_id
    - invoice_number
    - invoice_date
    - due_date
    - po_number
    - amount
    - paid_amount
    - balance
    - status
    - approved_by
  ar_aging:
    rows: 66
    columns:
    - customer_id
    - as_of_date
    - current
    - d_1_30
    - d_31_60
    - d_61_90
    - over_90
    - total
  ap_aging:
    rows: 38
    columns:
    - vendor_id
    - as_of_date
    - current
    - d_1_30
    - d_31_60
    - d_61_90
    - over_90
    - total
  inventory_items:
    rows: 120
    columns:
    - sku
    - description
    - category
    - unit_cost
    - on_hand_qty
    - reorder_point
    - last_received_date
  payroll_summary:
    rows: 21
    columns:
    - employee_id
    - employee_name
    - department
    - hire_date
    - termination_date
    - ytd_gross_pay
    - ytd_taxes_withheld
    - last_pay_date
    - is_active
    - username
  store_locations:
    rows: 4
    columns:
    - store_id
    - store_name
    - city
    - opening_date
    - square_feet
    - is_active
  pos_transactions:
    rows: 1200
    columns:
    - pos_txn_id
    - store_id
    - txn_date
    - tender
    - gross_amount
    - tax_amount
    - discount_amount
traps:
- trap_id: 2256ce8efb
  table: journal_entries
  column: debit
  row_keys:
  - JE-2025000703
  detectability: obvious
  severity: data_quality
  scope: single_column
  trap_class: negative_debit
  description: Debit amount is negative; debits should be non-negative.
  expected_finding: Flag negative debit in journal_entries.
- trap_id: 680ac22bd9
  table: journal_entries
  column: entry_date
  row_keys:
  - JE-2025000831
  detectability: obvious
  severity: data_quality
  scope: single_column
  trap_class: future_dated_entry
  description: Entry dated after fiscal-year end.
  expected_finding: Flag JE with entry_date > period_end.
- trap_id: a2b826ac36
  table: chart_of_accounts
  column: account_type
  row_keys:
  - '1200'
  detectability: obvious
  severity: data_quality
  scope: single_column
  trap_class: missing_account_type
  description: Account with blank type cannot be classified for financial statements.
  expected_finding: Flag account with missing account_type.
- trap_id: b171001914
  table: ap_invoices
  column: amount
  row_keys:
  - BILL-2025000133
  detectability: obvious
  severity: data_quality
  scope: single_column
  trap_class: zero_amount_open_invoice
  description: AP invoice has zero amount but open status.
  expected_finding: Flag zero-amount bills marked open.
- trap_id: 27b43f6579
  table: vendors
  column: tax_id
  row_keys:
  - VEND-00029
  detectability: obvious
  severity: data_quality
  scope: single_column
  trap_class: missing_tax_id
  description: 1099-eligible vendor lacks a tax ID.
  expected_finding: Flag vendor with empty tax_id.
- trap_id: af7692f153
  table: inventory_items
  column: on_hand_qty
  row_keys:
  - SKU-000112
  detectability: obvious
  severity: data_quality
  scope: single_column
  trap_class: negative_inventory
  description: Physical on-hand quantity cannot be negative.
  expected_finding: Flag SKU with negative on_hand_qty.
- trap_id: 7ba6e96654
  table: ar_invoices
  column: due_date
  row_keys:
  - INV-2025000205
  detectability: obvious
  severity: data_quality
  scope: single_column
  trap_class: due_before_invoice
  description: Invoice due_date precedes invoice_date.
  expected_finding: Flag invoices where due_date < invoice_date.
- trap_id: 67ae4f8320
  table: ap_invoices
  column: po_number
  row_keys:
  - BILL-2025000068
  detectability: moderate
  severity: control_weakness
  scope: cross_column
  trap_class: three_way_match_miss
  description: Material AP invoice booked without a PO reference.
  expected_finding: Flag AP invoices with amount > threshold and blank po_number.
- trap_id: c68aee36fa
  table: vendors
  column: vendor_name
  row_keys:
  - VEND-00008
  - VEND-00041
  detectability: moderate
  severity: control_weakness
  scope: cross_column
  trap_class: duplicate_vendor_variant
  description: Two vendor records with near-identical name and same bank_account_last4.
  expected_finding: Fuzzy-match vendor_name within identical bank_account_last4.
- trap_id: 0d7592fdc5
  table: ar_aging
  column: total
  row_keys:
  - CUST-00078
  detectability: moderate
  severity: control_weakness
  scope: cross_column
  trap_class: aging_sum_mismatch
  description: AR aging total != sum of bucket columns.
  expected_finding: Check current + d_1_30 + d_31_60 + d_61_90 + over_90 == total.
- trap_id: 44e4d298f9
  table: ar_invoices
  column: invoice_date
  row_keys:
  - INV-2025000220
  - INV-2025000366
  - INV-2025000036
  - INV-2025000346
  - INV-2025000214
  - INV-2025000041
  detectability: moderate
  severity: control_weakness
  scope: cross_column
  trap_class: sales_cutoff_spike
  description: Concentrated, oversized invoices dated in the last 3 days of FY.
  expected_finding: Histogram invoice_date near period-end; flag size+date co-spike.
- trap_id: e38ec32ed7
  table: payroll_summary
  column: hire_date
  row_keys:
  - EMP-00009
  detectability: moderate
  severity: control_weakness
  scope: cross_column
  trap_class: future_hire_date
  description: Active employee with hire_date after period end is being paid YTD.
  expected_finding: Flag is_active=True with hire_date > period_end and ytd_gross_pay
    > 0.
- trap_id: a70569bfa3
  table: journal_entries
  column: posted_by
  row_keys:
  - JE-2025900000
  - JE-2025900001
  - JE-2025900002
  - JE-2025900003
  detectability: subtle
  severity: material_misstatement
  scope: cross_table
  trap_class: round_dollar_terminated_user
  description: Round-dollar JEs in the final 2 days of FY posted by a user whose termination_date
    precedes the post date (cross-check journal_entries.posted_by against payroll_summary.username
    + termination_date).
  expected_finding: Join journal_entries to payroll_summary on posted_by==username;
    flag entries where entry_date > termination_date.
- trap_id: 3bb0cb54d5
  table: pos_transactions
  column: tender
  row_keys: []
  detectability: subtle
  severity: material_misstatement
  scope: cross_table
  trap_class: gift_card_year_end_redemption_burst
  description: Concentration of gift-card redemptions at year-end inflates revenue
    without proper liability reduction.
  expected_finding: Reconcile gift_card_liability redeemed_amount changes vs POS GIFT_CARD
    tender revenue.
