vertical: retail
size: big
level: L2
period_start: '2025-01-01'
period_end: '2025-12-31'
seed: 20260513
n_tables: 17
tables:
  chart_of_accounts:
    rows: 30
    columns:
    - account_id
    - account_name
    - account_type
    - parent_account_id
    - is_active
  journal_entries:
    rows: 8000
    columns:
    - entry_id
    - entry_date
    - account_id
    - debit
    - credit
    - memo
    - posted_by
    - posted_at
  trial_balance:
    rows: 30
    columns:
    - account_id
    - account_name
    - account_type
    - period_end
    - debit_balance
    - credit_balance
  customers:
    rows: 400
    columns:
    - customer_id
    - customer_name
    - customer_type
    - tax_id
    - email
    - phone
    - billing_country
    - credit_limit
    - created_at
    - is_active
  vendors:
    rows: 151
    columns:
    - vendor_id
    - vendor_name
    - tax_id
    - payment_terms
    - bank_account_last4
    - contact_email
    - country
    - is_1099
    - created_at
    - is_active
  ar_invoices:
    rows: 2400
    columns:
    - invoice_id
    - customer_id
    - invoice_date
    - due_date
    - amount
    - paid_amount
    - balance
    - status
    - currency
  ap_invoices:
    rows: 1200
    columns:
    - bill_id
    - vendor_id
    - invoice_number
    - invoice_date
    - due_date
    - po_number
    - amount
    - paid_amount
    - balance
    - status
    - approved_by
  ar_aging:
    rows: 343
    columns:
    - customer_id
    - as_of_date
    - current
    - d_1_30
    - d_31_60
    - d_61_90
    - over_90
    - total
  ap_aging:
    rows: 138
    columns:
    - vendor_id
    - as_of_date
    - current
    - d_1_30
    - d_31_60
    - d_61_90
    - over_90
    - total
  inventory_items:
    rows: 600
    columns:
    - sku
    - description
    - category
    - unit_cost
    - on_hand_qty
    - reorder_point
    - last_received_date
  payroll_summary:
    rows: 100
    columns:
    - employee_id
    - employee_name
    - department
