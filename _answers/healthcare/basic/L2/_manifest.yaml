vertical: healthcare
size: basic
level: L2
period_start: '2025-01-01'
period_end: '2025-12-31'
seed: 20260513
n_tables: 13
tables:
  chart_of_accounts:
    rows: 31
    columns:
    - account_id
    - account_name
    - account_type
    - parent_account_id
    - is_active
  journal_entries:
    rows: 2400
    columns:
    - entry_id
    - entry_date
    - account_id
    - debit
    - credit
    - memo
    - posted_by
    - posted_at
  trial_balance:
    rows: 31
    columns:
    - account_id
    - account_name
    - account_type
    - period_end
    - debit_balance
    - credit_balance
  customers:
    rows: 80
    columns:
    - customer_id
    - customer_name
    - customer_type
    - tax_id
    - email
    - phone
    - billing_country
    - credit_limit
    - created_at
    - is_active
  vendors:
    rows: 41
    columns:
    - vendor_id
    - vendor_name
    - tax_id
    - payment_terms
    - bank_account_last4
    - contact_email
    - country
    - is_1099
    - created_at
    - is_active
  ar_invoices:
    rows: 400
    columns:
    - invoice_id
    - customer_id
    - invoice_date
    - due_date
    - amount
    - paid_amount
    - balance
    - status
    - currency
  ap_invoices:
    rows: 240
    columns:
    - bill_id
    - vendor_id
    - invoice_number
    - invoice_date
    - due_date
    - po_number
    - amount
    - paid_amount
    - balance
    - status
    - approved_by
  ar_aging:
    rows: 63
    columns:
    - customer_id
    - as_of_date
    - current
    - d_1_30
    - d_31_60
    - d_61_90
    - over_90
    - total
  ap_aging:
    rows: 32
    columns:
    - vendor_id
    - as_of_date
    - current
    - d_1_30
    - d_31_60
    - d_61_90
    - over_90
    - total
  inventory_items:
    rows: 120
    columns:
    - sku
    - description
    - category
    - unit_cost
    - on_hand_qty
    - reorder_point
    - last_received_date
  payroll_summary:
    rows: 20
    columns:
    - employee_id
    - employee_name
    - department
    - hire_date
    - termination_date
    - ytd_gross_pay
    - ytd_taxes_withheld
    - last_pay_date
    - is_active
  payers:
    rows: 12
    columns:
    - payer_id
    - payer_name
    - payer_type
    - contractual_allowance_pct
  claims:
    rows: 1600
    columns:
    - claim_id
    - patient_id
    - payer_id
    - service_date
    - billed_amount
    - allowed_amount
    - paid_amount
    - adjustment_amount
    - status
traps:
- trap_id: fe463e7a83
  table: journal_entries
  column: debit
  row_keys:
  - JE-2025000356
  detectability: obvious
  severity: data_quality
  scope: single_column
  trap_class: negative_debit
  description: Debit amount is negative; debits should be non-negative.
  expected_finding: Flag negative debit in journal_entries.
- trap_id: 6e508b96de
  table: journal_entries
  column: entry_date
  row_keys:
  - JE-2025000734
  detectability: obvious
  severity: data_quality
  scope: single_column
  trap_class: future_dated_entry
  description: Entry dated after fiscal-year end.
  expected_finding: Flag JE with entry_date > period_end.
- trap_id: c0c5ba606a
  table: chart_of_accounts
  column: account_type
  row_keys:
  - '4000'
  detectability: obvious
  severity: data_quality
  scope: single_column
  trap_class: missing_account_type
  description: Account with blank type cannot be classified for financial statements.
  expected_finding: Flag account with missing account_type.
- trap_id: ad99088e8d
  table: ap_invoices
  column: amount
  row_keys:
  - BILL-2025000064
  detectability: obvious
  severity: data_quality
  scope: single_column
  trap_class: zero_amount_open_invoice
  description: AP invoice has zero amount but open status.
  expected_finding: Flag zero-amount bills marked open.
- trap_id: 02a9110d0e
  table: vendors
  column: tax_id
  row_keys:
  - VEND-00036
  detectability: obvious
  severity: data_quality
  scope: single_column
  trap_class: missing_tax_id
  description: 1099-eligible vendor lacks a tax ID.
  expected_finding: Flag vendor with empty tax_id.
- trap_id: 2457ac09b4
  table: inventory_items
  column: on_hand_qty
  row_keys:
  - SKU-000021
  detectability: obvious
  severity: data_quality
  scope: single_column
  trap_class: negative_inventory
  description: Physical on-hand quantity cannot be negative.
  expected_finding: Flag SKU with negative on_hand_qty.
- trap_id: 68e228d205
  table: ar_invoices
  column: due_date
  row_keys:
  - INV-2025000142
  detectability: obvious
  severity: data_quality
  scope: single_column
  trap_class: due_before_invoice
  description: Invoice due_date precedes invoice_date.
  expected_finding: Flag invoices where due_date < invoice_date.
- trap_id: 0d54844f70
  table: ap_invoices
  column: po_number
  row_keys:
  - BILL-2025000093
  detectability: moderate
  severity: control_weakness
  scope: cross_column
  trap_class: three_way_match_miss
  description: Material AP invoice booked without a PO reference.
  expected_finding: Flag AP invoices with amount > threshold and blank po_number.
- trap_id: d5d28ffb29
  table: vendors
  column: vendor_name
  row_keys:
  - VEND-00022
  - VEND-00041
  detectability: moderate
  severity: control_weakness
  scope: cross_column
  trap_class: duplicate_vendor_variant
  description: Two vendor records with near-identical name and same bank_account_last4.
  expected_finding: Fuzzy-match vendor_name within identical bank_account_last4.
- trap_id: e7f6b22570
  table: ar_aging
  column: total
  row_keys:
  - CUST-00031
  detectability: moderate
  severity: control_weakness
  scope: cross_column
  trap_class: aging_sum_mismatch
  description: AR aging total != sum of bucket columns.
  expected_finding: Check current + d_1_30 + d_31_60 + d_61_90 + over_90 == total.
- trap_id: 35d1d77ee1
  table: ar_invoices
  column: invoice_date
  row_keys:
  - INV-2025000254
  - INV-2025000165
  - INV-2025000160
  - INV-2025000046
  - INV-2025000389
  - INV-2025000201
  detectability: moderate
  severity: control_weakness
  scope: cross_column
  trap_class: sales_cutoff_spike
  description: Concentrated, oversized invoices dated in the last 3 days of FY.
  expected_finding: Histogram invoice_date near period-end; flag size+date co-spike.
- trap_id: ada61c41c1
  table: payroll_summary
  column: hire_date
  row_keys:
  - EMP-00018
  detectability: moderate
  severity: control_weakness
  scope: cross_column
  trap_class: future_hire_date
  description: Active employee with hire_date after period end is being paid YTD.
  expected_finding: Flag is_active=True with hire_date > period_end and ytd_gross_pay
    > 0.
