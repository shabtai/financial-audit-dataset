vertical: manufacturing
size: basic
level: L2
period_start: '2025-01-01'
period_end: '2025-12-31'
seed: 20260513
n_tables: 13
tables:
  chart_of_accounts:
    rows: 31
    columns:
    - account_id
    - account_name
    - account_type
    - parent_account_id
    - is_active
  journal_entries:
    rows: 2400
    columns:
