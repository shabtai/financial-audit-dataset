    - credit
    - memo
    - posted_by
    - posted_at
  trial_balance:
    rows: 31
    columns:
    - account_id
    - account_name
    - account_type
    - period_end
    - debit_balance
    - credit_balance
  customers:
    rows: 80
    columns:
    - customer_id
    - customer_name
    - customer_type
    - tax_id
    - email
    - phone
    - billing_country
    - credit_limit
    - created_at
    - is_active
  vendors:
    rows: 41
    columns:
    - vendor_id
    - vendor_name
    - tax_id
    - payment_terms
    - bank_account_last4
    - contact_email
    - country
    - is_1099
    - created_at
    - is_active
  ar_invoices:
    rows: 400
    columns:
    - invoice_id
    - customer_id
    - invoice_date
    - due_date
    - amount
    - paid_amount
    - balance
    - status
    - currency
  ap_invoices:
    rows: 240
